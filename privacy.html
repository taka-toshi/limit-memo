<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>プライバシーポリシー - Memo App</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            max-width: 820px;
            margin: 28px auto;
            padding: 0 16px;
            color: #222
        }

        h1,
        h2 {
            color: #0b65c2
        }

        pre {
            white-space: pre-wrap
        }

        footer {
            margin-top: 36px;
            color: #666;
            font-size: 0.9rem
        }

        a {
            color: #0b65c2
        }
    </style>
    <link rel="icon" href="data:image/svg+xml,
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
        <text x='50' y='50' text-anchor='middle' dominant-baseline='central' font-size='90'>📝</text>
        </svg>">
    <!-- DOMPurify: sanitize HTML generated from Markdown to prevent XSS -->
    <!-- Add `integrity` (SRI) and `crossorigin` in production. Replace PLACEHOLDER with real hash. -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"
        integrity="sha384-Tsl3d5pUAO7a13enIvSsL3O0/95nsthPJiPto5NtLuY8w3+LbZOpr3Fl2MNmrh1E"
        crossorigin="anonymous"></script>
</head>

<body>
    <div id="policy-container">読み込み中…</div>
    <script type="module">
        try {
            const res = await fetch('./privacy.md');
            if (!res.ok) throw new Error('ロード失敗');
            const md = await res.text();

            // Try to load marked if available, otherwise render as pre
            if (globalThis.marked) {
                // sanitize marked output before inserting into DOM
                const dirty = marked.parse(md);
                const clean = DOMPurify.sanitize(dirty, {
                    ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'ul', 'ol', 'li', 'code', 'pre', 'h1', 'h2', 'h3', 'blockquote', 'hr'],
                    ALLOWED_ATTR: []
                });
                document.getElementById('policy-container').innerHTML = clean;
            } else {
                // dynamically load marked from CDN then render
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
                // For production, set SRI and crossorigin. Replace PLACEHOLDER with computed hash.
                s.crossOrigin = 'anonymous';
                s.integrity = 'sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+';
                s.onload = () => {
                    const dirty = marked.parse(md);
                    const clean = DOMPurify.sanitize(dirty, {
                        ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'ul', 'ol', 'li', 'code', 'pre', 'h1', 'h2', 'h3', 'blockquote', 'hr'],
                        ALLOWED_ATTR: []
                    });
                    document.getElementById('policy-container').innerHTML = clean;
                };
                s.onerror = () => {
                    const pre = document.createElement('pre');
                    pre.textContent = md;
                    const c = document.getElementById('policy-container');
                    c.textContent = '';
                    c.appendChild(pre);
                };
                document.head.appendChild(s);
            }
        } catch (e) {
            const c = document.getElementById('policy-container');
            c.textContent = 'ポリシーの読み込みに失敗しました。';
            console.error(e);
        }
    </script>
</body>

</html>
